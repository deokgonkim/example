apiVersion: apps/v1
kind: Deployment
metadata:
  name: aws-eks-backend
  labels:
    app: aws-eks-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aws-eks-backend
  template:
    metadata:
      labels:
        app: aws-eks-backend
    spec:
      containers:
        - name: backend
          image: your-registry/aws-eks-backend:latest
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
